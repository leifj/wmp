name: Deploy Jekyll site (docs) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copy the top-level spec/*.md into the Jekyll _specs collection so they
      # render inline under /wmp/spec/<slug>/ without moving the source files.
      - name: Sync specs into docs/_specs
        run: |
          set -eu
          mkdir -p docs/_specs
          rm -f docs/_specs/*.md
          for f in spec/*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            slug=${name%.md}
            title=$(grep -m1 '^# ' "$f" | sed 's/^# *//' || true)
            [ -n "$title" ] || title="$slug"
            {
              echo '---'
              echo "title: \"$title\""
              echo "slug: \"$slug\""
              echo '---'
              # Strip the first H1 since the layout renders the title above.
              awk 'BEGIN{skipped=0} /^# /&&!skipped{skipped=1;next} {print}' "$f"
            } > "docs/_specs/${slug}.md"
          done
          ls -la docs/_specs

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        working-directory: docs
        run: |
          bundle exec jekyll build --destination ../_site
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
